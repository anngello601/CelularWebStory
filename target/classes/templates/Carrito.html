<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - NEXO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-light">

    <header th:replace="~{fragments/layout :: headerFragment}"></header>

    <div class="container my-5">
        <h2 class="mb-4">Carrito de Compras</h2>

        <!-- CARRITO VACÍO -->
        <div id="carritoVacio" class="text-center py-5 d-none">
            <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
            <p class="text-muted fs-5">Tu carrito está vacío</p>
            <a th:href="@{/productos}" class="btn btn-primary">Ver productos</a>
        </div>

        <!-- CARRITO CON ITEMS -->
        <div id="carritoContenido" class="d-none">
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Producto</th>
                                <th>Precio unit.</th>
                                <th>Cantidad</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="carritoBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="d-flex justify-content-end align-items-center gap-3 mt-4">
                <h5 class="mb-0">
                    Total: <span class="text-success fw-bold">S/ <span id="total">0.00</span></span>
                </h5>
                <a th:href="@{/compra}" class="btn btn-success px-4">
                    <i class="fas fa-credit-card me-2"></i>Finalizar Compra
                </a>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", renderizarCarrito);

        function renderizarCarrito() {
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            const tbody = document.getElementById("carritoBody");
            const vacio = document.getElementById("carritoVacio");
            const contenido = document.getElementById("carritoContenido");

            tbody.innerHTML = "";

            if (carrito.length === 0) {
                vacio.classList.remove("d-none");
                contenido.classList.add("d-none");
                return;
            }

            vacio.classList.add("d-none");
            contenido.classList.remove("d-none");

            let total = 0;
            carrito.forEach((p, i) => {
                const subtotal = p.precio * p.cantidad;
                total += subtotal;
                tbody.innerHTML += `
            <tr>
                <td class="ps-4">
                    <div class="d-flex align-items-center gap-3">
                        <img src="/imagenes/${p.imagen}" width="60" height="60"
                             style="object-fit:contain;" class="rounded">
                        <span class="fw-semibold">${p.nombre}</span>
                    </div>
                </td>
                <td>S/ ${p.precio.toFixed(2)}</td>
                <td>
                    <input type="number" class="form-control form-control-sm" style="width:75px;"
                           value="${p.cantidad}" min="1"
                           onchange="cambiarCantidad(${i}, this.value)">
                </td>
                <td class="fw-bold">S/ ${subtotal.toFixed(2)}</td>
                <td class="pe-4">
                    <button class="btn btn-sm btn-outline-danger" onclick="eliminarItem(${i})"
                            title="Eliminar">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>`;
            });

            document.getElementById("total").textContent = total.toFixed(2);
        }

        function cambiarCantidad(index, valor) {
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            const nueva = parseInt(valor);
            if (nueva < 1 || isNaN(nueva)) return;
            carrito[index].cantidad = nueva;
            localStorage.setItem("carrito", JSON.stringify(carrito));
            renderizarCarrito();
        }

        function eliminarItem(index) {
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            carrito.splice(index, 1);
            localStorage.setItem("carrito", JSON.stringify(carrito));
            renderizarCarrito();
        }
    </script>
    <script th:src="@{/javascript/buscador.js}"></script>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>
</body>

</html>

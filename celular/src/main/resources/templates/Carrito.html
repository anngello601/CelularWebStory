<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Carrito - NEXO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>

<body>

<header class="bg-dark text-white shadow-sm sticky-top">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            
            <!-- LOGO / LINK -->
            <a class="nav-link text-white fw-bold" th:href="@{/productos}">NEXO</a>

            <button class="navbar-toggler border-0" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- BUSCADOR -->
                <div class="mx-auto w-50 my-3 my-lg-0">
                    <input type="text" class="form-control" placeholder="Buscar productos...">
                </div>

                <!-- MENÚ -->
                <ul class="navbar-nav ms-auto align-items-center gap-2">

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/inicio}">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/productos}">Productos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/ayuda}">Ayuda</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/contactanos}">Contáctanos</a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/carrito}" class="btn btn-outline-light">
                            <i class="fas fa-shopping-cart"></i>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/sesion}" class="btn btn-primary ms-2">Iniciar sesión</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
</header>

<div class="container mt-5">
    <h2>Carrito de Compras</h2>

    <table class="table table-striped table-hover mt-4">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody id="carrito"></tbody>
    </table>

    <h4>Total: S/ <span id="total">0</span></h4>

    <a th:href="@{/compra}" class="btn btn-success">Finalizar Compra</a>
</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    <p>NEXO © 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 SCRIPT CORREGIDO -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    let total = 0;
    let tabla = document.getElementById("carrito");

    // 🔴 Si no existe la tabla, evitar error
    if (!tabla) return;

    // 🔴 Si el carrito está vacío
    if (carrito.length === 0) {
        tabla.innerHTML = `
            <tr>
                <td colspan="4" class="text-center text-muted">
                    Tu carrito está vacío
                </td>
            </tr>
        `;
        return;
    }

    carrito.forEach(p => {

        let nombre = p.nombre || "Producto";
        let precio = p.precio || 0;
        let cantidad = p.cantidad || 1;

        let subtotal = precio * cantidad;
        total += subtotal;

        tabla.innerHTML += `
            <tr>
                <td>${nombre}</td>
                <td>S/ ${precio}</td>
                <td>${cantidad}</td>
                <td>S/ ${subtotal}</td>
            </tr>
        `;
    });

    document.getElementById("total").innerText = total;

});
</script>

</body>
</html>

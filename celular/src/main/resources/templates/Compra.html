<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Compra - NEXO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>

<body>

<header class="bg-dark text-white shadow-sm sticky-top">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            
            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center text-white" th:href="@{/inicio}">
                <img th:src="@{/imagenes/Logo.png}" alt="Logo NEXO" style="height: 50px;">
                <h1 class="h3 mb-0 ms-2 text-white">NEXO</h1>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- BUSCADOR -->
                <div class="mx-auto w-50 my-3 my-lg-0">
                    <input type="text" class="form-control" placeholder="Buscar productos...">
                </div>

                <!-- MENÚ -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2">

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/inicio}">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/productos}">Productos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/ayuda}">Ayuda</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/contactanos}">Contáctanos</a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/carrito}" class="btn btn-outline-light">
                            <i class="fas fa-shopping-cart"></i>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/sesion}" class="btn btn-primary ms-2">Iniciar sesión</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
</header>

<div class="container mt-5">
    <h2>Finalizar Compra</h2>

    <form onsubmit="return false;">
        <input class="form-control mb-3" placeholder="Nombre completo" required>
        <input class="form-control mb-3" placeholder="Dirección" required>

        <select class="form-control mb-3">
            <option>Tarjeta</option>
            <option>Yape</option>
            <option>Transferencia</option>
        </select>

        <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#miModal">
            Confirmar Compra
        </button>
    </form>
</div>

<!-- MODAL -->
<div class="modal fade" id="miModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Compra realizada</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Tu compra fue exitosa ✅
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="finalizar()">Aceptar</button>
            </div>

        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center p-4 mt-5">
    <p>NEXO © 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 SCRIPT CORREGIDO -->
<script>
function finalizar(){
    localStorage.removeItem("carrito");

    // 🔥 REDIRECCIÓN CORRECTA CON SPRING
    window.location.href = "/inicio";
}
</script>

</body>
</html>

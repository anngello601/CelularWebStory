<!--
    NEXO - Chatbot Fragment
-->

<div th:fragment="chatbot">

    <!-- ── CONTENEDOR DEL CHATBOT ── -->
    <div id="chatbot-container">

        <!-- Caja del chat -->
        <div id="chat-box">

            <!-- Cabecera -->
            <div id="chat-header">
                <div class="avatar">🤖</div>
                <div class="info">
                    <div class="name">Asistente NEXO</div>
                    <div class="status">🟢 En línea</div>
                </div>
                <button id="chat-close" title="Cerrar">✕</button>
            </div>

            <!-- Mensajes -->
            <div id="chat-messages"></div>

            <!-- Input -->
            <div id="chat-input-container">
                <input type="text" id="user-input" placeholder="Escribe tu consulta..." autocomplete="off">
                <button id="send-btn" title="Enviar">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

        </div>

        <!-- Botón flotante -->
        <button id="chat-toggle" title="Abrir chat">
            <i class="fas fa-comments"></i>
        </button>

    </div>

    <!-- CSS del chatbot -->
    <link rel="stylesheet" th:href="@{/css/chatbot.css}">

    <!-- JS del chatbot -->
    <script th:src="@{/javascript/chatbot.js}"></script>

</div>

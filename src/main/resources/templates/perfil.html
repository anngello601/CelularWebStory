<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - NEXO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-light">

    <header th:replace="~{fragments/layout :: headerFragment}"></header>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <h2 class="text-center mb-4">Mi Perfil</h2>

                <div th:if="${exito}" class="alert alert-success">
                    Perfil actualizado correctamente.
                </div>

                <div class="card shadow-sm p-4">

                    <div class="text-center mb-4">
                        <div class="bg-secondary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                            style="width:80px; height:80px; font-size:2rem;">
                            <i class="fas fa-user"></i>
                        </div>
                        <h4 class="mt-3 mb-0" th:text="${usuario.nombre}"></h4>
                        <small class="text-muted" th:text="${usuario.correo}"></small>
                    </div>

                    <hr>

                    <div class="mb-2">
                        <span class="text-muted small">Nombre</span>
                        <p class="mb-0 fw-semibold" th:text="${usuario.nombre}"></p>
                    </div>
                    <div class="mb-3">
                        <span class="text-muted small">Correo</span>
                        <p class="mb-0 fw-semibold" th:text="${usuario.correo}"></p>
                    </div>

                    <hr>

                    <a th:href="@{/perfil/editar}" class="btn btn-primary w-100 mb-2">
                        <i class="fas fa-edit me-2"></i>Editar Perfil
                    </a>

                    <button type="button" class="btn btn-outline-danger w-100" data-bs-toggle="modal"
                        data-bs-target="#modalEliminar">
                        <i class="fas fa-trash me-2"></i>Eliminar Cuenta
                    </button>

                </div>
            </div>
        </div>
    </div>

    <!-- Modal confirmación eliminar -->
    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-danger"><i class="fas fa-exclamation-triangle me-2"></i>Eliminar Cuenta
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    ¿Estás seguro de que deseas eliminar tu cuenta? Esta acción no se puede deshacer.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <form th:action="@{/perfil/eliminar}" method="post">
                        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/buscador.js}"></script>
</body>

</html>

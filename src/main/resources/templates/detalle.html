<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        .product-thumbnail {
            cursor: pointer;
            transition: 0.3s ease;
        }

        .product-thumbnail:hover {
            opacity: 0.7;
        }

        .color-circle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            display: inline-block;
            margin-right: 5px;
        }

        .price-box {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
        }

        .nexo-box {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background-color: #fff;
            padding: 15px;
        }

        .nav-tabs .nav-link {
            color: #495057;
            font-weight: 500;
            border: none;
            border-bottom: 2px solid transparent;
        }

        .nav-tabs .nav-link.active {
            color: #0d6efd;
            background-color: transparent;
            border-color: transparent transparent #0d6efd;
        }
    </style>
</head>

<body class="bg-light">
    <header th:replace="~{fragments/layout :: headerFragment}"></header>


    <div class="container my-5">


        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb" style="font-size: 0.85rem;">
                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted">Tecnología</a></li>
                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted">Celulares</a></li>
                <li class="breadcrumb-item active text-dark fw-bold" aria-current="page" th:text="${producto.nombre}">
                    Nombre del Producto</li>
            </ol>
        </nav>

        <div class="row mb-5 bg-white p-4 rounded shadow-sm">

            <div class="col-lg-6 mb-4">

                <div class="card border-0 mb-3 bg-white text-center p-3 rounded-top shadow-sm">
                    <img th:src="@{'/imagenes/' + ${producto.imagen}}" class="img-fluid"
                        style="height: 400px; object-fit: contain;" alt="Imagen del producto">
                </div>

                <div class="d-flex gap-2 justify-content-center">
                    <img th:src="@{'/imagenes/' + ${producto.imagen}}"
                        class="border rounded p-1 product-thumbnail bg-white"
                        style="width: 80px; height: 80px; object-fit: contain;" alt="Miniatura">
                </div>

            </div>

            <div class="col-lg-6 px-lg-4">
                <p class="text-primary fw-bold mb-1 text-uppercase" style="font-size: 0.85rem; letter-spacing: 1px;"
                    th:text="${producto.marca}"></p>
                <h1 class="h3 fw-bold mb-2" th:text="${producto.nombre}"></h1>

                <div class="mb-3" style="font-size: 0.9rem;">
                    <span class="text-warning"><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i
                            class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i><i
                            class="bi bi-star-fill"></i></span>
                    <span class="text-muted ms-2">(5.0)</span>
                </div>

                <div class="price-box mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-dark">Precio Internet</span>
                        <h3 class="fw-bold mb-0 text-success">S/ <span th:text="${producto.precio}"></span></h3>
                    </div>
                </div>

                <div class="mb-4">
                    <p class="mb-2 text-muted fw-bold">Stock disponible: <span id="stockDisplay" class="text-dark"
                            th:text="${producto.stock}"></span></p>
                </div>

                <div class="row g-2 mb-4 align-items-end">
                    <div class="col-3 col-md-2">
                        <label class="form-label" style="font-size: 0.85rem;">Cantidad</label>
                        <div class="input-group">
                            <input type="number" id="cantidad" class="form-control text-center px-1" value="1" min="1"
                                th:max="${producto.stock}" th:disabled="${producto.stock == 0}">
                        </div>
                    </div>
                    <div class="col-9 col-md-10">
                        <button class="btn btn-dark w-100 py-2 fw-bold mb-2"
                            th:attr="data-id=${producto.id}, data-nombre=${producto.nombre}, data-precio=${producto.precio}, data-imagen=${producto.imagen}, data-logueado=${session.usuario != null}, data-stock=${producto.stock}"
                            th:disabled="${producto.stock == 0}" onclick="agregarAlCarritoConCantidad(this)">
                            <span th:if="${producto.stock > 0}">🛒 Agregar al carro</span>
                            <span th:if="${producto.stock == 0}">Sin stock</span>
                        </button>
                    </div>
                </div>

                <ul class="list-unstyled text-muted" style="font-size: 0.9rem;">
                    <li><i class="bi bi-shield-check text-info me-2"></i> <strong>Garantía:</strong> <span
                            th:text="${producto.garantia}"></span></li>
                </ul>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow-sm">
            <ul class="nav nav-tabs mb-4" id="detallesTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active px-4" id="especificaciones-tab" data-bs-toggle="tab"
                        data-bs-target="#especificaciones" type="button" role="tab">Especificaciones</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link px-4" id="condiciones-tab" data-bs-toggle="tab"
                        data-bs-target="#condiciones" type="button" role="tab">Condiciones</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link px-4" id="devoluciones-tab" data-bs-toggle="tab"
                        data-bs-target="#devoluciones" type="button" role="tab">Cambios y Devoluciones</button>
                </li>
            </ul>

            <div class="tab-content" id="detallesTabContent">
                <div class="tab-pane fade show active" id="especificaciones" role="tabpanel">
                    <table class="table table-bordered text-muted">
                        <tbody>
                            <tr>
                                <td class="bg-light w-50 p-3 fw-bold">Marca</td>
                                <td class="p-3" th:text="${producto.marca}"></td>
                            </tr>
                            <tr>
                                <td class="bg-light p-3 fw-bold">Almacenamiento</td>
                                <td class="p-3" th:text="${producto.almacenamiento}"></td>
                            </tr>
                            <tr>
                                <td class="bg-light p-3 fw-bold">Memoria RAM</td>
                                <td class="p-3" th:text="${producto.ram}"></td>
                            </tr>
                            <tr>
                                <td class="bg-light p-3 fw-bold">Procesador</td>
                                <td class="p-3" th:text="${producto.procesador}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="tab-pane fade p-3 text-muted" id="condiciones" role="tabpanel">
                    <p th:text="${producto.condiciones}"></p>
                </div>

                <div class="tab-pane fade p-3 text-muted" id="devoluciones" role="tabpanel">
                    <p th:text="${producto.devoluciones}"></p>
                </div>
            </div>
        </div>

    </div>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/carrito.js}"></script>
    <script th:src="@{/javascript/buscador.js}"></script>
</body>

</html>

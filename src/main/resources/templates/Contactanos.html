<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - NEXO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>

<body>

    <header th:replace="~{fragments/layout :: headerFragment}"></header>

    <!-- FORMULARIO -->
    <div class="container mt-5 mb-5">
        <h2 class="text-center mb-4">Contáctanos</h2>

        <form id="formulario" class="p-4 shadow rounded bg-light" novalidate>

            <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="tel" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea class="form-control" rows="3" required></textarea>
            </div>

            <button type="button" class="btn btn-primary w-100" onclick="enviarFormulario()">
                Enviar
            </button>

        </form>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalForm" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Mensaje enviado</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Gracias por contactarnos 📩
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>

            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 🔥 SCRIPT MEJORADO -->
    <script>
        function enviarFormulario() {
            let form = document.getElementById("formulario");

            if (form.checkValidity()) {
                let modalElement = document.getElementById('modalForm');
                let modal = new bootstrap.Modal(modalElement);
                modal.show();

                form.reset();
            } else {
                form.reportValidity();
            }
        }
    </script>
    <script th:src="@{/javascript/buscador.js}"></script>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>
</body>

</html>

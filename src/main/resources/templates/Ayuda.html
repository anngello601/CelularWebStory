<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayuda - NEXO</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; }
    </style>
</head>

<body class="bg-light">

    <header th:replace="~{fragments/layout :: headerFragment}"></header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content container py-5">
        <h2 class="mb-5 text-center fw-bold">Centro de Ayuda</h2>

        <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">
            <!-- Tarjeta 1 -->
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-3">
                            <i class="fas fa-shopping-cart me-2"></i>¿Cómo comprar?
                        </h5>
                        <p class="card-text text-muted">Selecciona un producto, agrégalo al carrito y finaliza tu compra de forma segura.</p>
                    </div>
                </div>
            </div>

            <!-- Tarjeta 2 -->
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-3">
                            <i class="fas fa-credit-card me-2"></i>¿Métodos de pago?
                        </h5>
                        <p class="card-text text-muted">Aceptamos tarjetas de crédito, débito, transferencias y pagos vía Yape.</p>
                    </div>
                </div>
            </div>

            <!-- Tarjeta 3 -->
            <div class="col">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-3">
                            <i class="fas fa-truck me-2"></i>¿Envíos?
                        </h5>
                        <p class="card-text text-muted">Realizamos envíos a todo Lima y provincias con seguimiento garantizado.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>
    
    <!-- Fragments de funcionalidad -->
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/buscador.js}"></script>
</body>

</html>

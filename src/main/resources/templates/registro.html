<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NEXO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-light">

    <header th:replace="~{fragments/layout :: headerFragment}"></header>

    <!-- REGISTRO -->
    <div class="container mt-5">
        <div class="row justify-content-center">

            <div class="col-md-6">

                <h2 class="text-center mb-4">Crear Cuenta</h2>

                <div class="card shadow-sm p-4">

                    <form th:action="@{/registro}" method="post" th:object="${user}">

                        <!-- NOMBRE -->
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control"
                                th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'" placeholder="Tu nombre">
                            <div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="invalid-feedback">
                            </div>
                        </div>

                        <!-- CORREO -->
                        <div class="mb-3">
                            <label class="form-label">Correo</label>
                            <input type="email" th:field="*{correo}" class="form-control"
                                th:classappend="${#fields.hasErrors('correo')} ? 'is-invalid'"
                                placeholder="correo@email.com">
                            <div th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}" class="invalid-feedback">
                            </div>
                        </div>

                        <!-- CONTRASEÑA -->
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                placeholder="Mínimo 6 caracteres">
                            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                                class="invalid-feedback">
                            </div>
                        </div>

                        <!-- CONFIRMAR CONTRASEÑA -->
                        <div class="mb-3">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" class="form-control" name="confirmPassword" placeholder="********">
                        </div>

                        <!-- BOTÓN -->
                        <button type="submit" class="btn btn-success w-100">
                            Registrarse
                        </button>

                        <!-- LINK LOGIN -->
                        <div class="text-center mt-3">
                            <small>¿Ya tienes cuenta?</small>
                            <a th:href="@{/login}" class="d-block">Inicia sesión</a>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/buscador.js}"></script>
</body>

</html>

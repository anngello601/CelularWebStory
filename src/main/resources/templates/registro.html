<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registro - NEXO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-light">

<!-- HEADER (igual al login) -->
<header class="bg-dark text-white shadow-sm sticky-top">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center text-white" th:href="@{/}">
                <img th:src="@{/imagenes/Logo.png}" alt="Logo NEXO" style="height: 50px;">
                <h1 class="h3 mb-0 ms-2 text-white">NEXO</h1>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <div class="mx-auto w-50 my-3 my-lg-0">
                    <input type="text" class="form-control" placeholder="Buscar productos...">
                </div>

                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-2">

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/}">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/productos}">Productos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" th:href="@{/login}">Login</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
</header>

<!-- REGISTRO -->
<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">

            <h2 class="text-center mb-4">Crear Cuenta</h2>

            <div class="card shadow-sm p-4">

                <form th:action="@{/registro}" method="post">

                    <!-- NOMBRE -->
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" name="nombre" placeholder="Tu nombre" required>
                    </div>

                    <!-- CORREO -->
                    <div class="mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" name="correo" placeholder="correo@email.com" required>
                    </div>

                    <!-- CONTRASEÑA -->
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" name="password" placeholder="********" required>
                    </div>

                    <!-- CONFIRMAR CONTRASEÑA -->
                    <div class="mb-3">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" class="form-control" name="confirmPassword" placeholder="********" required>
                    </div>

                    <!-- ERROR -->
                    <div th:if="${error}" class="alert alert-danger">
                        Error al registrar usuario
                    </div>

                    <!-- BOTÓN -->
                    <button type="submit" class="btn btn-success w-100">
                        Registrarse
                    </button>

                    <!-- LINK LOGIN -->
                    <div class="text-center mt-3">
                        <small>¿Ya tienes cuenta?</small>
                        <a th:href="@{/login}" class="d-block">Inicia sesión</a>
                    </div>

                </form>

            </div>

        </div>

    </div>
</div>

<!-- FOOTER (igual al login) -->
<footer class="bg-dark text-white pt-5 pb-4 mt-5 position-relative">
    <div class="container">
        <div class="row align-items-center">

            <div class="col-md-5 mb-4">
                <img th:src="@{/imagenes/Logo.png}" alt="Logo de NEXO" style="height: 60px;" class="mb-3">

                <p class="text-secondary">
                    Somos una tienda de celulares en Lima, Perú.
                </p>

                <div>
                    <a href="#" class="text-white me-3 fs-4"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="text-white me-3 fs-4"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="text-white fs-4"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>

        </div>
    </div>

    <div class="position-absolute bottom-0 end-0 me-3 mb-2 small text-secondary">
        v 2.0.2
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

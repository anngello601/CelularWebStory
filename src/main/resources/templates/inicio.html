<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO - Tienda de Celulares</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-light">

    <header th:replace="~{fragments/layout :: headerFragment}"></header>

    <main>

        <!-- BANNER -->
        <section class="mb-5 py-4">
            <div class="container">
                <div class="position-relative rounded overflow-hidden shadow">
                    <img th:src="@{/imagenes/Banner.webp}" class="img-fluid w-100">
                    <div class="position-absolute top-50 start-0 translate-middle-y p-3 p-md-5 text-white">
                        <span class="d-block fw-bold mb-2 fs-4">iPhone 17 Pro Max</span>
                        <a th:href="@{/producto/1}" class="btn btn-primary">Comprar ahora</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- PRODUCTOS -->
        <section class="container mb-5">
            <h2 class="text-center mb-4">Productos Populares</h2>
            <div class="row g-4">

                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 shadow-sm">
                        <img th:src="@{/imagenes/producto1.jpg}" class="card-img-top"
                            style="height: 200px; object-fit: contain; padding: 1rem;">
                        <div class="card-body text-center">
                            <h5>iPhone 15 Pro</h5>
                            <p class="text-muted">256GB - Titanio Negro</p>
                            <p class="h4 text-primary">S/.3699</p>
                            <a th:href="@{/producto/1}" class="btn btn-primary w-100">Comprar</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 shadow-sm">
                        <img th:src="@{/imagenes/producto2.jpg}" class="card-img-top"
                            style="height: 200px; object-fit: contain; padding: 1rem;">
                        <div class="card-body text-center">
                            <h5>Samsung S24</h5>
                            <p class="text-muted">512GB - Violeta</p>
                            <p class="h4 text-primary">S/.3399</p>
                            <a th:href="@{/producto/2}" class="btn btn-primary w-100">Comprar</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 shadow-sm">
                        <img th:src="@{/imagenes/producto3.jpg}" class="card-img-top"
                            style="height: 200px; object-fit: contain; padding: 1rem;">
                        <div class="card-body text-center">
                            <h5>Xiaomi 14 Pro</h5>
                            <p class="text-muted">256GB - Negro</p>
                            <p class="h4 text-primary">S/.2199</p>
                            <a th:href="@{/producto/3}" class="btn btn-primary w-100">Comprar</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card h-100 shadow-sm">
                        <img th:src="@{/imagenes/producto4.jpg}" class="card-img-top"
                            style="height: 200px; object-fit: contain; padding: 1rem;">
                        <div class="card-body text-center">
                            <h5>Google Pixel 8</h5>
                            <p class="text-muted">128GB - Blanco</p>
                            <p class="h4 text-primary">S/.2499</p>
                            <a th:href="@{/producto/4}" class="btn btn-primary w-100">Comprar</a>
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/buscador.js}"></script>
</body>

</html>

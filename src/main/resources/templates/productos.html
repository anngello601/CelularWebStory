<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO - Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body class="bg-light">

    <header th:replace="~{fragments/layout :: headerFragment}"></header>
    <!-- Carrusel de Marcas (superior) -->
    <div class="d-flex justify-content-center gap-4 mb-5 overflow-auto pb-2 px-3">
        <th:block th:each="m : ${marcas}">
            <a th:href="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? @{/productos} : @{/productos(marca=${m.nombre})}"
                class="text-decoration-none text-center">
                <div class="brand-circle mx-auto mb-2"
                    th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'active border-primary shadow-sm' : ''">
                    <!-- Ícono según el nombre de la marca -->
                    <i th:if="${m.nombre == 'Apple'}" class="fa-brands fa-apple fs-3"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-dark'"></i>
                    <i th:if="${m.nombre == 'Samsung'}" class="fa-solid fa-mobile-screen fs-3"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-secondary'"></i>
                    <i th:if="${m.nombre == 'Xiaomi'}" class="fa-solid fa-mobile fs-3"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-secondary'"></i>
                    <i th:if="${m.nombre == 'Motorola'}" class="fs-4 fw-bold"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-dark'">M</i>
                    <i th:if="${m.nombre == 'Google'}" class="fa-brands fa-google fs-3"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-dark'"></i>
                    <!-- Agrega más condiciones para otras marcas (ej. Honor, Poco, Redmi) -->
                    <i th:if="${m.nombre == 'Honor'}" class="fa-regular fa-star fs-3"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-dark'"></i>
                    <i th:if="${m.nombre == 'Poco'}" class="fa-solid fa-bolt fs-3"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-dark'"></i>
                    <i th:if="${m.nombre == 'Redmi'}" class="fa-solid fa-bolt fs-3"
                        th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-dark'"></i>
                </div>
                <small class="fw-bold"
                    th:classappend="${marcasSeleccionadas != null and marcasSeleccionadas.contains(m.nombre)} ? 'text-primary' : 'text-muted'"
                    th:text="${m.nombre}"></small>
            </a>
        </th:block>
    </div>

    <div class="container-fluid py-4" style="background:#f6f8fb;">



        <div class="row px-lg-4">

            <div class="col-lg-3 d-none d-lg-block">
                <div class="bg-white p-4 rounded-4 shadow-sm border-0">

                    <h6 class="fw-bold mb-1 text-uppercase">Celulares</h6>
                    <p class="text-muted small mb-4" id="resultCount">Mostrando todos los productos</p>

                    <hr class="mb-4 text-muted">

                    <!-- MARCA -->
                    <div class="mb-4">
                        <label class="filter-title d-block">MARCA</label>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-marca" type="checkbox" id="brandSamsung"
                                value="Samsung">
                            <label class="form-check-label text-muted small" for="brandSamsung">Samsung</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-marca" type="checkbox" id="brandApple" value="Apple">
                            <label class="form-check-label text-muted small" for="brandApple">Apple (iPhone)</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-marca" type="checkbox" id="brandXiaomi"
                                value="Xiaomi">
                            <label class="form-check-label text-muted small" for="brandXiaomi">Xiaomi</label>
                        </div>

                        <div class="form-check mb-2">
                            <input class="form-check-input filter-marca" type="checkbox" id="brandMotorola"
                                value="Motorola">
                            <label class="form-check-label text-muted small" for="brandMotorola">Motorola</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-marca" type="checkbox" id="brandHonor" value="Honor">
                            <label class="form-check-label text-muted small" for="brandHonor">Honor</label>
                        </div>
                    </div>

                    <!-- PRECIO -->
                    <div class="mb-4">
                        <label class="filter-title d-block">PRECIO (S/.) — hasta: <span
                                id="priceLabel">8000</span></label>
                        <input type="range" class="form-range" min="200" max="8000" value="8000" step="100"
                            id="priceRange">
                        <div class="d-flex justify-content-between text-muted small mt-1" style="font-size: 0.75rem;">
                            <span>S/. 200</span>
                            <span>S/. 8,000</span>
                        </div>
                    </div>

                    <!-- ALMACENAMIENTO -->
                    <div class="mb-4">
                        <label class="filter-title d-block">ALMACENAMIENTO</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="storage-btn filter-storage" data-value="64">64 GB</div>
                            </div>
                            <div class="col-6">
                                <div class="storage-btn filter-storage" data-value="128">128 GB</div>
                            </div>
                            <div class="col-6">
                                <div class="storage-btn filter-storage" data-value="256">256 GB</div>
                            </div>
                            <div class="col-6">
                                <div class="storage-btn filter-storage" data-value="512">512 GB</div>
                            </div>
                            <div class="col-6">
                                <div class="storage-btn filter-storage" data-value="1tb">1 TB</div>
                            </div>
                        </div>
                    </div>

                    <!-- COLOR -->
                    <div class="mb-4">
                        <label class="filter-title d-block">COLOR</label>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="color-filter" data-color="negro" style="background:#212529;"
                                title="Negro"></span>
                            <span class="color-filter" data-color="blanco"
                                style="background:#f8f9fa; border:1px solid #dee2e6;" title="Blanco"></span>
                            <span class="color-filter" data-color="azul" style="background:#0d6efd;"
                                title="Azul"></span>
                        </div>
                    </div>

                    <button id="btnAplicar" class="btn btn-dark w-100 fw-bold py-2 btn-sm rounded-3">APLICAR
                        FILTROS</button>
                    <button id="btnLimpiar"
                        class="btn btn-outline-secondary w-100 fw-bold py-2 btn-sm rounded-3 mt-2">LIMPIAR
                        FILTROS</button>
                </div>
            </div>

            <div class="col-lg-9">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <span class="text-muted small">Mostrando resultados</span>
                    <div class="d-flex align-items-center">
                        <span class="text-muted small me-2">Ordenar por:</span>
                        <select id="sortSelect"
                            class="form-select form-select-sm border-0 text-primary fw-semibold bg-transparent shadow-none"
                            style="width: auto;">
                            <option value="default">Más recientes</option>
                            <option value="asc">Menor precio</option>
                            <option value="desc">Mayor precio</option>
                        </select>
                    </div>
                </div>

                <div class="row g-4" id="productGrid">
                    <div class="col-xl-4 col-md-6 product-item" th:each="producto : ${productos}"
                        th:data-marca="${producto.marca != null ? producto.marca.nombre : ''}"
                        th:data-precio="${producto.precio}"
                        th:data-almacenamiento="${producto.almacenamiento != null ? producto.almacenamiento.capacidad : ''}"
                        th:data-nombre="${producto.nombre}">
                        <div class="card border-0 product-card h-100 shadow-sm position-relative">

                            <div class="badge-custom rounded badge-purple" th:if="${producto.precioNormal != null}">
                                OFERTA NEXO</div>

                            <div class="bg-dark bg-opacity-10 text-center p-4 rounded-top"
                                style="height: 220px; display: flex; align-items: center; justify-content: center;">
                                <a th:href="@{/producto/{id}(id=${producto.id})}">
                                    <img th:src="@{'/imagenes/' + ${producto.imagen}}" class="img-fluid"
                                        style="max-height: 170px; object-fit: contain;" alt="Producto">
                                </a>
                            </div>

                            <div class="card-body p-4 d-flex flex-column">

                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="text-primary fw-bold text-uppercase"
                                        th:text="${producto.marca != null ? producto.marca.nombre : 'Sin marca'}"></span>
                                    <span class="text-muted" style="font-size: 0.8rem;">
                                        <i class="fa-solid fa-star" style="color: #e51a4b;"></i> <span
                                            th:text="${producto.rating}">4.9</span>
                                    </span>
                                </div>

                                <h6 class="fw-bold mb-3 fs-5">
                                    <a th:href="@{/producto/{id}(id=${producto.id})}"
                                        class="text-dark text-decoration-none" th:text="${producto.nombre}"></a>
                                </h6>

                                <ul class="list-unstyled text-muted mb-4" style="font-size: 0.85rem;">
                                    <span
                                        th:text="${producto.marca != null ? producto.marca.nombre : 'Sin marca'}"></span>
                                    <li><span
                                            th:text="${producto.procesador != null ? producto.procesador.modelo : 'N/A'}"></span>
                                    </li>
                                    <li><span th:text="${producto.ram != null ? producto.ram.capacidad : 'N/A'}"></span>
                                        RAM</li>
                                    <li><span
                                            th:text="${producto.almacenamiento != null ? producto.almacenamiento.capacidad : 'N/A'}"></span>
                                    </li>
                                </ul>

                                <div class="d-flex justify-content-between align-items-end mt-auto">
                                    <div>
                                        <small class="text-muted text-decoration-line-through d-block"
                                            style="font-size: 0.75rem;" th:if="${producto.precioNormal != null}"
                                            th:text="'S/ ' + ${producto.precioNormal}"></small>
                                        <h5 class="fw-bold text-dark mb-0 fs-4" th:text="'S/ ' + ${producto.precio}">
                                        </h5>
                                    </div>
                                    <button
                                        class="btn btn-primary rounded-3 d-flex align-items-center justify-content-center"
                                        style="width: 45px; height: 45px;"
                                        th:attr="data-id=${producto.id}, data-nombre=${producto.nombre}, data-precio=${producto.precio}, data-imagen=${producto.imagen}, data-logueado=${session.usuario != null}, data-stock=${producto.stock}"
                                        th:disabled="${producto.stock == 0}"
                                        th:title="${producto.stock == 0} ? 'Sin stock disponible' : 'Agregar al carrito'"
                                        onclick="agregarAlCarrito(this)">
                                        <i class="fa-solid fa-cart-shopping fs-5"></i>
                                    </button>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
                <div th:replace="~{fragments/paginacion :: paginacion}"></div>


            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footerFragment}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/javascript/carrito.js}"></script>
    <script th:src="@{/javascript/paginacionGlobal.js}"></script>
    <script th:src="@{/javascript/buscador.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Esperar un poco para que Thymeleaf termine de renderizar
            setTimeout(function () {
                if (typeof inicializarPaginacion === 'function') {
                    // Usa reiniciarPaginacion para forzar el cálculo
                    reiniciarPaginacion('productGrid', 10);
                }
            }, 100);
        });
    </script>
    <script>
        // =============================================
        // BUSCADOR
        // =============================================
        const buscador = document.getElementById('buscador');
        const resultados = document.getElementById('resultadosBusqueda');

        if (buscador && resultados) {
            buscador.addEventListener('input', function () {
                const texto = this.value.trim();
                resultados.innerHTML = '';
                resultados.style.display = 'none';
                if (texto.length < 2) return;
                fetch('/api/productos/buscar?q=' + encodeURIComponent(texto))
                    .then(r => r.json())
                    .then(productos => {
                        resultados.innerHTML = '';
                        if (productos.length === 0) {
                            resultados.innerHTML = '<div class="list-group-item text-muted small py-2">No se encontraron productos</div>';
                            resultados.style.display = 'block';
                            return;
                        }
                        productos.forEach(p => {
                            resultados.innerHTML += `
                                <a href="/producto/${p.id}" class="list-group-item list-group-item-action">
                                    <div class="d-flex align-items-center">
                                        <img src="/imagenes/${p.imagen}" width="50" height="50" style="object-fit:contain" class="me-3">
                                        <div>
                                            <div class="fw-bold">${p.nombre}</div>
                                            <small class="text-primary">S/ ${p.precio}</small>
                                        </div>
                                    </div>
                                </a>`;
                        });
                        resultados.style.display = 'block';
                    })
                    .catch(e => console.error('Error búsqueda:', e));
            });
            document.addEventListener('click', function (e) {
                if (!buscador.contains(e.target) && !resultados.contains(e.target))
                    resultados.style.display = 'none';
            });
        }

        // =============================================
        // FILTROS
        // =============================================
        const priceRange = document.getElementById('priceRange');
        const priceLabel = document.getElementById('priceLabel');
        const sortSelect = document.getElementById('sortSelect');
        const productGrid = document.getElementById('productGrid');

        // Precio: actualizar label en tiempo real
        priceRange.addEventListener('input', function () {
            priceLabel.textContent = Number(this.value).toLocaleString('es-PE');
        });

        // Almacenamiento: toggle visual
        document.querySelectorAll('.filter-storage').forEach(btn => {
            btn.addEventListener('click', function () {
                this.classList.toggle('active');
            });
        });

        // Color: toggle visual
        document.querySelectorAll('.color-filter').forEach(dot => {
            dot.addEventListener('click', function () {
                this.classList.toggle('active');
            });
        });

        function actualizarContador(total) {
            const texto = total === 0
                ? 'Sin resultados para estos filtros'
                : `Mostrando ${total} producto${total !== 1 ? 's' : ''}`;
            document.getElementById('resultCount').textContent = texto;
            document.getElementById('resultCountTop').textContent = texto;
        }

        function aplicarFiltros() {
            const marcasSel = Array.from(
                document.querySelectorAll('.filter-marca:checked')
            ).map(cb => cb.value.trim().toLowerCase());

            const precioMax = parseInt(priceRange.value);

            const storageSel = Array.from(
                document.querySelectorAll('.filter-storage.active')
            ).map(btn => btn.getAttribute('data-value').trim().toLowerCase());

            const coloresSel = Array.from(
                document.querySelectorAll('.color-filter.active')
            ).map(dot => dot.getAttribute('data-color').trim().toLowerCase());

            const orden = sortSelect.value;
            const items = Array.from(document.querySelectorAll('.product-item'));

            const visibles = [];
            const ocultos = [];

            items.forEach(item => {
                const marca = (item.getAttribute('data-marca') || '').trim().toLowerCase();
                const precio = parseFloat(item.getAttribute('data-precio')) || 0;
                const almacen = (item.getAttribute('data-almacenamiento') || '').trim().toLowerCase().replace(/\s+/g, '');
                const nombre = (item.getAttribute('data-nombre') || '').trim().toLowerCase();

                const pasaMarca = marcasSel.length === 0 || marcasSel.some(m => marca.includes(m) || m.includes(marca));
                const pasaPrecio = precio <= precioMax;
                const pasaStorage = storageSel.length === 0 || storageSel.some(s => almacen.includes(s));
                const pasaColor = coloresSel.length === 0 || coloresSel.some(c => nombre.includes(c));

                if (pasaMarca && pasaPrecio && pasaStorage && pasaColor) {
                    item.style.display = '';
                    visibles.push(item);
                } else {
                    item.style.display = 'none';
                    ocultos.push(item);
                }
            });

            // Ordenar visibles
            if (orden === 'asc') {
                visibles.sort((a, b) =>
                    parseFloat(a.getAttribute('data-precio')) - parseFloat(b.getAttribute('data-precio')));
            } else if (orden === 'desc') {
                visibles.sort((a, b) =>
                    parseFloat(b.getAttribute('data-precio')) - parseFloat(a.getAttribute('data-precio')));
            }

            visibles.forEach(i => productGrid.appendChild(i));
            ocultos.forEach(i => productGrid.appendChild(i));

            actualizarContador(visibles.length);

            if (typeof reiniciarPaginacion === 'function') {
                reiniciarPaginacion('productGrid', 10);
            }
        }

        function limpiarFiltros() {
            document.querySelectorAll('.filter-marca').forEach(cb => cb.checked = false);
            priceRange.value = 8000;
            priceLabel.textContent = '8,000';
            document.querySelectorAll('.filter-storage').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.color-filter').forEach(dot => dot.classList.remove('active'));
            sortSelect.value = 'default';
            document.querySelectorAll('.product-item').forEach(i => i.style.display = '');
            actualizarContador(document.querySelectorAll('.product-item').length);

            if (typeof reiniciarPaginacion === 'function') {
                reiniciarPaginacion('productGrid', 10);
            }
        }

        document.getElementById('btnAplicar').addEventListener('click', aplicarFiltros);
        document.getElementById('btnLimpiar').addEventListener('click', limpiarFiltros);
        sortSelect.addEventListener('change', aplicarFiltros);


        // Contador inicial
        window.addEventListener('load', function () {
            actualizarContador(document.querySelectorAll('.product-item').length);
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof inicializarPaginacion === 'function') {
                // El segundo parámetro es el número de elementos por página
                inicializarPaginacion('productGrid', 10);
            } else {
                console.warn('⚠️ paginacionGlobal.js no cargado');
            }
        });
    </script>

    <style>
        body {
            background-color: #f6f8fb;
        }

        /* Tipografía básica */
        h6 {
            font-size: 14px;
        }

        small {
            font-size: 12px;
        }

        /* Carrusel de Marcas */
        .brand-circle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .brand-circle:hover {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .brand-circle.active {
            border-color: #0d6efd;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.15);
        }

        /* Estilos del Sidebar */
        .filter-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            color: #6c757d;
        }

        .storage-btn {
            border: 1px solid #dee2e6;
            color: #6c757d;
            font-size: 0.8rem;
            padding: 6px 0;
            border-radius: 8px;
            background: white;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .storage-btn:hover {
            border-color: #adb5bd;
        }

        .storage-btn.active {
            border-color: #0d6efd;
            color: #0d6efd;
            background-color: #f0f8ff;
            font-weight: 600;
        }

        .color-filter {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 0 1px #dee2e6;
        }

        .color-filter.active {
            box-shadow: 0 0 0 2px #0d6efd;
        }

        /* Estilos de la Tarjeta */
        .product-card {
            border-radius: 16px;
            transition: 0.25s ease;
            background: white;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08) !important;
        }

        /* Etiquetas (Badge) */
        .badge-custom {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 0.65rem;
            padding: 4px 8px;
            font-weight: bold;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .badge-purple {
            background-color: #9d00ff;
            color: white;
        }

        /* Paginación */
        .page-link {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
    </style>
    <div th:replace="~{fragments/chatbot :: chatbot}"></div>
    <div th:replace="~{fragments/darkmode :: darkmode}"></div>
</body>


</html>

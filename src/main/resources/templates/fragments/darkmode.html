<!--
    NEXO - Dark Mode Fragment
-->

<div th:fragment="darkmode">

    <!-- CSS MODO OSCURO -->
    <style>
        :root {
            --bg-color: #f6f8fb;
            --card-bg: #ffffff;
            --text-color: #212529;
            --text-muted-color: #6c757d;
            --border-color: #dee2e6;
            --input-bg: #ffffff;
            --input-color: #212529;
            --table-stripe: #f8f9fa;
            --footer-bg: #212529;
        }
        [data-theme="dark"] {
            --bg-color: #0f1117;
            --card-bg: #1a1d2e;
            --text-color: #e2e8f0;
            --text-muted-color: #94a3b8;
            --border-color: #2d3748;
            --input-bg: #1e2235;
            --input-color: #e2e8f0;
            --table-stripe: #1e2235;
            --footer-bg: #0a0c14;
        }
        body {
            background-color: var(--bg-color) !important;
            color: var(--text-color) !important;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .card, .bg-white, .modal-content {
            background-color: var(--card-bg) !important;
            color: var(--text-color) !important;
            border-color: var(--border-color) !important;
        }
        .text-muted        { color: var(--text-muted-color) !important; }
        .text-dark         { color: var(--text-color) !important; }
        .bg-light          { background-color: var(--bg-color) !important; }
        .list-group-item   {
            background-color: var(--card-bg) !important;
            color: var(--text-color) !important;
            border-color: var(--border-color) !important;
        }
        .list-group-item:hover { background-color: var(--table-stripe) !important; }
        .form-control, .form-select {
            background-color: var(--input-bg) !important;
            color: var(--input-color) !important;
            border-color: var(--border-color) !important;
        }
        .form-control::placeholder { color: var(--text-muted-color) !important; }
        .table             { color: var(--text-color) !important; }
        .table td, .table th { border-color: var(--border-color) !important; }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: var(--table-stripe) !important;
            color: var(--text-color) !important;
        }
        footer.bg-dark     { background-color: var(--footer-bg) !important; }

        /* Botón toggle */
        #darkToggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: 0.3s ease;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        #darkToggle:hover { background: rgba(255, 255, 255, 0.28); }
    </style>

    <!-- Script: aplica tema guardado ANTES de renderizar la página -->
    <script>
        (function () {
            const saved = localStorage.getItem('nexo-theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>

    <!-- Script: lógica del botón toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggleBtn = document.getElementById('darkToggle');
            if (!toggleBtn) return;

            // Sincronizar ícono con tema actual
            const current = localStorage.getItem('nexo-theme') || 'light';
            toggleBtn.textContent = current === 'dark' ? '☀️' : '🌙';

            toggleBtn.addEventListener('click', function () {
                const next = document.documentElement.getAttribute('data-theme') === 'dark'
                    ? 'light'
                    : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('nexo-theme', next);
                toggleBtn.textContent = next === 'dark' ? '☀️' : '🌙';
            });
        });
    </script>

</div>
